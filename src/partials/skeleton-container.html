<h3 class="mw-section-subtitle">Skeleton Loader</h3>

<div class="mw-grid-3 mw-gap-6">
  <!-- COLUMN 1: Text skeleton -->
  <div>
    <h3 class="mw-card-title mw-mb-4">Text Lines</h3>
    <div class="mw-card mw-card-simple">
      <h5 class="mw-text-medium mw-mb-3">Article Placeholder</h5>
      <div class="mw-skeleton-card">
        <span class="mw-skeleton mw-skeleton-title"></span>
        <span class="mw-skeleton mw-skeleton-text"></span>
        <span class="mw-skeleton mw-skeleton-text"></span>
        <span class="mw-skeleton mw-skeleton-text"></span>
      </div>

      <h5 class="mw-text-medium mw-mt-4 mw-mb-3">Short Paragraph</h5>
      <div class="mw-skeleton-card">
        <span class="mw-skeleton mw-skeleton-text"></span>
        <span class="mw-skeleton mw-skeleton-text"></span>
      </div>
    </div>
  </div>

  <!-- COLUMN 2: Avatar + text -->
  <div>
    <h3 class="mw-card-title mw-mb-4">Avatar & Content</h3>
    <div class="mw-card mw-card-simple">
      <h5 class="mw-text-medium mw-mb-3">User Card</h5>
      <div class="mw-skeleton-card">
        <div class="mw-skeleton-row">
          <span class="mw-skeleton mw-skeleton-circle"></span>
          <div class="mw-skeleton-body">
            <span
              class="mw-skeleton mw-skeleton-text"
              style="width: 55%"
            ></span>
            <span
              class="mw-skeleton mw-skeleton-text"
              style="width: 80%"
            ></span>
          </div>
        </div>
        <span class="mw-skeleton mw-skeleton-text"></span>
        <span class="mw-skeleton mw-skeleton-text"></span>
      </div>

      <h5 class="mw-text-medium mw-mt-4 mw-mb-3">Comment Row</h5>
      <div class="mw-skeleton-card">
        <div class="mw-skeleton-row">
          <span class="mw-skeleton mw-skeleton-circle"></span>
          <div class="mw-skeleton-body">
            <span
              class="mw-skeleton mw-skeleton-text"
              style="width: 40%"
            ></span>
            <span class="mw-skeleton mw-skeleton-text"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- COLUMN 3: Image + rect shapes -->
  <div>
    <h3 class="mw-card-title mw-mb-4">Image & Shapes</h3>
    <div class="mw-card mw-card-simple">
      <h5 class="mw-text-medium mw-mb-3">Image Card</h5>
      <div class="mw-skeleton-card">
        <span class="mw-skeleton mw-skeleton-rect"></span>
        <span class="mw-skeleton mw-skeleton-title"></span>
        <span class="mw-skeleton mw-skeleton-text"></span>
        <span class="mw-skeleton mw-skeleton-text"></span>
      </div>

      <h5 class="mw-text-medium mw-mt-4 mw-mb-3">Small Banner</h5>
      <div class="mw-skeleton-card">
        <span class="mw-skeleton mw-skeleton-rect mw-skeleton-rect-sm"></span>
        <span class="mw-skeleton mw-skeleton-text" style="width: 50%"></span>
      </div>
    </div>
  </div>
</div>
