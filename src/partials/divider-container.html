<h3 class="mw-section-subtitle">Divider</h3>

<div class="mw-grid-2 mw-gap-6">
  <div>
    <h3 class="mw-card-title mw-mb-4">Horizontal</h3>
    <div class="mw-card mw-card-simple mw-grid-1 mw-gap-6">
      <div>
        <h5 class="mw-text-medium mw-mb-2">Default</h5>
        <p class="mw-text-muted">Content above</p>
        <hr class="mw-divider" />
        <p class="mw-text-muted">Content below</p>
      </div>
      <div>
        <h5 class="mw-text-medium mw-mb-2">Thick</h5>
        <hr class="mw-divider mw-divider-thick" />
      </div>
      <div>
        <h5 class="mw-text-medium mw-mb-2">Dashed</h5>
        <hr class="mw-divider mw-divider-dashed" />
      </div>
      <div>
        <h5 class="mw-text-medium mw-mb-2">Primary color</h5>
        <hr class="mw-divider mw-divider-primary" />
      </div>
      <div>
        <h5 class="mw-text-medium mw-mb-2">Secondary color</h5>
        <hr class="mw-divider mw-divider-secondary" />
      </div>
    </div>
  </div>

  <div>
    <h3 class="mw-card-title mw-mb-4">With Text & Vertical</h3>
    <div class="mw-card mw-card-simple mw-grid-1 mw-gap-6">
      <div>
        <h5 class="mw-text-medium mw-mb-2">With label</h5>
        <div class="mw-divider-text">
          <span>or</span>
        </div>
      </div>
      <div>
        <div class="mw-divider-text">
          <span>Section Title</span>
        </div>
      </div>
      <div>
        <div class="mw-divider-text mw-divider-primary">
          <span><i class="fas fa-star"></i> Featured</span>
        </div>
      </div>

      <div>
        <h5 class="mw-text-medium mw-mb-2">Vertical (inside flex row)</h5>
        <div
          style="display: flex; align-items: center; gap: 1rem; height: 70px"
        >
          <span class="mw-text-muted">Left</span>
          <div class="mw-divider-vertical"></div>
          <span class="mw-text-muted">Middle</span>
          <div class="mw-divider-vertical"></div>
          <span class="mw-text-muted">Right</span>
        </div>
      </div>
    </div>
  </div>
</div>
